<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Thanh Toán</title>

<style>
body { font-family: sans-serif; background:#f5f5f5; margin:0; }
.container { max-width:420px; margin:auto; padding:15px; }

.screen { display:none; }
.active { display:block; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#28a745;
  color:white;
  font-weight:bold;
}

.bank {
  background:white;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  cursor:pointer;
}

.center { text-align:center; }

.loading { margin-top:15px; color:gray; }
</style>
</head>

<body>

<div class="container">

<!-- SCREEN 1 -->
<div id="confirm" class="screen active">
  <h3>Xác nhận thanh toán</h3>

  <div class="card">
    <p><b id="name"></b></p>
    <p>Số TK: <span id="account"></span></p>
    <p>Số tiền: <b id="amount"></b> đ</p>
    <p>Nội dung: <span id="desc"></span></p>
  </div>

  <button onclick="goBank()">Tiếp tục</button>
</div>

<!-- SCREEN 2 -->
<div id="bank" class="screen">
  <h3>Chọn phương thức</h3>

  <div class="bank" onclick="pay('momo')">MoMo</div>
  <div class="bank" onclick="pay('bank')">Ngân hàng (QR)</div>

  <button onclick="goConfirm()">Quay lại</button>
</div>

<!-- SCREEN 3 -->
<div id="qrScreen" class="screen center">
  <h3>Thanh toán</h3>

  <div id="loading" class="loading">
    ⏳ Đang chuyển sang app ngân hàng...<br>
    Vui lòng mở app và quét QR
  </div>

  <img id="qrImg" width="250">

  <button onclick="success()">Tôi đã thanh toán</button>
</div>

<!-- SCREEN 4 -->
<div id="success" class="screen center">
  <h2 style="color:green">✅ Thành công</h2>
  <p id="result"></p>
  <button onclick="reset()">Quay lại</button>
</div>

</div>

<script>

// DATA
const data = {
  account: "4702205301198",
  name: "TRAN PHUONG VY",
  amount: "50000",
  desc: "TT RAC HD001 THANG 03",
  bankBIN: "970416" // ACB
};

// INIT
document.getElementById("name").innerText = data.name;
document.getElementById("account").innerText = data.account;
document.getElementById("amount").innerText = Number(data.amount).toLocaleString();
document.getElementById("desc").innerText = data.desc;

// QR
const qr = `https://img.vietqr.io/image/${data.bankBIN}-${data.account}-compact.png?amount=${data.amount}&addInfo=${encodeURIComponent(data.desc)}&accountName=${encodeURIComponent(data.name)}`;
document.getElementById("qrImg").src = qr;

// NAVIGATION
function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goBank(){ show("bank"); }
function goConfirm(){ show("confirm"); }

// PAYMENT
function pay(type){
  show("qrScreen");

  setTimeout(() => {
    if(type === "momo"){
      window.location.href = "momo://";
    } else {
      window.location.href = "https://dl.vietqr.io/pay?app=acb";
    }
  }, 500);

  setTimeout(() => {
    document.getElementById("loading").innerHTML =
      "⚠️ Nếu app chưa mở,<br>hãy mở app ngân hàng và quét QR";
  }, 2000);
}

// SUCCESS
function success(){
  show("success");
  document.getElementById("result").innerText =
    data.amount + "đ - " + data.desc;
}

// RESET
function reset(){
  show("confirm");
}

</script>

</body>
</html>
