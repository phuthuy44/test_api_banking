<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Demo Thanh Toán Ngân Hàng</title>

<style>
body { font-family: sans-serif; background:#f5f5f5; }
.container { max-width: 420px; margin: auto; background:white; padding:15px; border-radius:10px; }

input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: #28a745;
    color: white;
    font-weight: bold;
    border: none;
}

.popup {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid #ccc;
    padding: 15px;
    display: none;
}

.bank {
    padding: 12px;
    border: 1px solid #ddd;
    margin: 6px 0;
    border-radius: 6px;
    cursor: pointer;
}

.bank:hover {
    background: #f0f0f0;
}

#qr img {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h3>Thanh toán tiền rác</h3>

    <label>Số tài khoản:</label>
    <input id="account" value="4702205301198">

    <label>Tên người nhận:</label>
    <input id="name" value="TRAN PHUONG VY">

    <label>Số tiền:</label>
    <input id="amount" value="50000">

    <label>Nội dung:</label>
    <input id="desc" value="TT RAC HD001 THANG 03">

    <button onclick="openBanks()">Thanh toán</button>

    <div id="qr"></div>
</div>

<!-- Popup chọn app -->
<div class="popup" id="popup">
    <h4>Chọn app thanh toán</h4>

    <div class="bank" onclick="openApp('vcb://')">Vietcombank</div>
    <div class="bank" onclick="openApp('vietinbank://')">VietinBank</div>
    <div class="bank" onclick="openApp('tcb://')">Techcombank</div>
    <div class="bank" onclick="openApp('acb://')">ACB</div>
    <div class="bank" onclick="openApp('momo://')">MoMo</div>

    <button onclick="closePopup()">Đóng</button>
</div>

<script>

function openBanks() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function openApp(scheme) {
    closePopup();

    // thử mở app
    window.location.href = scheme;

    // nếu fail → hiện QR
    setTimeout(() => {
        showQR();
    }, 1500);
}

function showQR() {
    const account = document.getElementById("account").value;
    const name = document.getElementById("name").value;
    const amount = document.getElementById("amount").value;
    const desc = document.getElementById("desc").value;

    // 👉 BIN Vietcombank = 970436 (bạn có thể đổi bank khác)
    const bankBIN = "970436";

    const qr = `https://img.vietqr.io/image/${bankBIN}-${account}-compact.png?amount=${amount}&addInfo=${encodeURIComponent(desc)}&accountName=${encodeURIComponent(name)}`;

    document.getElementById("qr").innerHTML = `
        <p><b>📱 Quét QR để thanh toán</b></p>
        <img src="${qr}">
        <p><small>Nội dung: ${desc}</small></p>
    `;
}

</script>

</body>
</html>
