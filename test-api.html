<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Demo Thanh Toán</title>

<style>
body { font-family: sans-serif; background:#f5f5f5; }
.container { max-width: 420px; margin: auto; background:white; padding:15px; border-radius:10px; }

input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: #28a745;
    color: white;
    font-weight: bold;
    border: none;
}

.popup {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid #ccc;
    padding: 15px;
    display: none;
}

.bank {
    padding: 12px;
    border: 1px solid #ddd;
    margin: 6px 0;
    border-radius: 6px;
    cursor: pointer;
}

.bank:hover { background:#f0f0f0; }

#qr img { width:100%; margin-top:10px; }
</style>
</head>

<body>

<div class="container">
    <h3>Thanh toán tiền rác</h3>

    <input id="account" value="4702205301198">
    <input id="name" value="TRAN PHUONG VY">
    <input id="amount" value="50000">
    <input id="desc" value="TT RAC HD001 THANG 03">

    <button onclick="openBanks()">Thanh toán</button>

    <div id="result"></div>
</div>

<div class="popup" id="popup">
    <h4>Chọn app thanh toán</h4>

    <div class="bank" onclick="openApp('momo://', 'MoMo')">MoMo (khuyên dùng)</div>
    <div class="bank" onclick="openApp('vcb://', 'Vietcombank')">Vietcombank</div>
    <div class="bank" onclick="openApp('vietinbank://', 'VietinBank')">VietinBank</div>
    <div class="bank" onclick="openApp('tcb://', 'Techcombank')">Techcombank</div>
    <div class="bank" onclick="openApp('acb://', 'ACB')">ACB</div>

    <button onclick="closePopup()">Đóng</button>
</div>

<script>

function openBanks() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// 🔥 core demo
function openApp(scheme, bankName) {
    closePopup();

    let opened = false;

    window.addEventListener("blur", () => {
        opened = true;
    });

    // loading UI
    document.getElementById("result").innerHTML = `
        <div style="text-align:center">
            <h3>🔄 Đang mở ${bankName}...</h3>
        </div>
    `;

    // thử mở app
    window.location.href = scheme;

    setTimeout(() => {
        if (!opened) {
            // ❌ không mở được → fake success + QR
            fakeSuccess(bankName);
        }
    }, 1500);
}

// 🎯 fake thành công để demo không fail
function fakeSuccess(bankName) {
    const amount = document.getElementById("amount").value;
    const desc = document.getElementById("desc").value;

    document.getElementById("result").innerHTML = `
        <div style="text-align:center">
            <h2 style="color:green">✅ Thanh toán thành công</h2>
            <p>Ngân hàng: ${bankName}</p>
            <p>Số tiền: ${amount}đ</p>
            <p>Nội dung: ${desc}</p>
        </div>
    `;

    showQR(); // vẫn có QR thật phía dưới
}

// QR thật
function showQR() {
    const account = document.getElementById("account").value;
    const name = document.getElementById("name").value;
    const amount = document.getElementById("amount").value;
    const desc = document.getElementById("desc").value;

    const bankBIN = "970436"; // Vietcombank

    const qr = `https://img.vietqr.io/image/${bankBIN}-${account}-compact.png?amount=${amount}&addInfo=${encodeURIComponent(desc)}&accountName=${encodeURIComponent(name)}`;

    document.getElementById("result").innerHTML += `
        <p><b>📱 Quét QR để thanh toán thật</b></p>
        <img src="${qr}">
    `;
}

</script>

</body>
</html>
