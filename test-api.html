<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh Toán VietQR</title>
    <style>
        .container { font-family: sans-serif; max-width: 420px; margin: 20px auto; }
        select, input, button { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #ccc; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
        .loading { font-size: 12px; color: gray; }
        img { width: 100%; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Cổng Thanh Toán VietQR</h3>
    
    <label>Chọn ngân hàng:</label>
    <select id="bankList">
        <option value="">-- Đang tải danh sách... --</option>
    </select>

    <label>Số tài khoản:</label>
    <input type="text" id="accountNo" value="0123456789">

    <label>Tên người nhận:</label>
    <input type="text" id="accountName" value="NGUYEN VAN A">

    <label>Số tiền:</label>
    <input type="number" id="amount" value="50000">

    <label>Nội dung:</label>
    <input type="text" id="description" value="Thanh toan don hang">

    <button onclick="pay()">Thanh toán</button>

    <p id="status" class="loading"></p>

    <div id="qrContainer"></div>
</div>

<script>
const bankSelect = document.getElementById('bankList');
const status = document.getElementById('status');
const qrContainer = document.getElementById('qrContainer');

// Load danh sách ngân hàng
async function fetchBanks() {
    try {
        const res = await fetch('https://api.vietqr.io/v2/banks');
        const data = await res.json();

        bankSelect.innerHTML = '<option value="">-- Chọn ngân hàng --</option>';

        data.data.forEach(bank => {
            const option = document.createElement('option');
            option.value = JSON.stringify({
                bin: bank.bin,
                shortName: bank.shortName
            });
            option.textContent = bank.shortName + " - " + bank.name;
            bankSelect.appendChild(option);
        });

        status.innerText = "Đã tải " + data.data.length + " ngân hàng";
    } catch (e) {
        status.innerText = "Lỗi tải ngân hàng!";
        console.error(e);
    }
}

// Thanh toán
function pay() {
    const selectedBank = bankSelect.value;
    const accountNo = document.getElementById('accountNo').value;
    const accountName = document.getElementById('accountName').value;
    const amount = document.getElementById('amount').value;
    const description = document.getElementById('description').value;

    if (!selectedBank || !accountNo) {
        alert("Vui lòng nhập đủ thông tin!");
        return;
    }

    const bank = JSON.parse(selectedBank);
    const encodedDesc = encodeURIComponent(description);

    // 1. Link mở trung gian (mobile sẽ mở app)
    const payLink = `https://api.vietqr.io/v2/generate?accountNo=${accountNo}&accountName=${encodeURIComponent(accountName)}&acqId=${bank.bin}&amount=${amount}&addInfo=${encodedDesc}`;

    // 2. QR fallback (luôn dùng được)
    const qrImg = `https://img.vietqr.io/image/${bank.shortName}-${accountNo}-compact.png?amount=${amount}&addInfo=${encodedDesc}`;

    // Hiển thị QR
    qrContainer.innerHTML = `
        <p><b>Quét QR nếu không mở được app:</b></p>
        <img src="${qrImg}" />
    `;

    status.innerText = "Đang chuyển sang app ngân hàng...";

    // Delay nhỏ để hiển thị QR trước
    setTimeout(() => {
        window.location.href = payLink;
    }, 500);
}

// Init
fetchBanks();
</script>

</body>
</html>
