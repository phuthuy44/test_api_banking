<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Deeplink Test ACB</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .primary { background: #007bff; color: white; }
        .qr { background: #28a745; color: white; }
        img { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<h2>Test ACB Deeplink iOS</h2>

<p>Số tiền: 50,000đ</p>
<p>Nội dung: TESTZALO</p>

<button class="primary" onclick="openACB()">
    1. Mở App ACB (iOS Deeplink)
</button>

<button class="qr" onclick="showQR()">
    2. Hiển thị QR fallback
</button>

<img id="qr" style="display:none;" />

<script>
const accountNo = "4702205301198";
const amount = "50000";
const note = "TESTZALO";

// 🔥 Deeplink ACB (test)
const deeplink = `acb://transfer?account=${accountNo}&amount=${amount}&note=${note}`;

// 🔥 QR VietQR fallback
const qrUrl = `https://img.vietqr.io/image/970416-${accountNo}.png?amount=${amount}&addInfo=${note}`;

function openACB() {

    // try open app
    window.location.href = deeplink;

    // fallback nếu iOS không mở app
    setTimeout(() => {
        document.getElementById("qr").src = qrUrl;
        document.getElementById("qr").style.display = "block";
    }, 1500);
}

function showQR() {
    document.getElementById("qr").src = qrUrl;
    document.getElementById("qr").style.display = "block";
}
</script>

</body>
</html>
